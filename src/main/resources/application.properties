spring.application.name=Practice-project
server.port=2004



spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/codingprofile
spring.datasource.username=root
spring.datasource.password=root
# Tells Hibernate to automatically create tables if they do not exist
spring.jpa.hibernate.ddl-auto=update

# Optional: Prints the SQL statements to the Eclipse console so you can see the table creation happen
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${redishost}
spring.data.redis.port=6379
spring.cache.type=redis

spring.security.user.name=kamesh
spring.security.user.password=kamesh

# Brevo SMTP Configuration
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${Brevousername}
spring.mail.password=${BrevoPassword}

# Mail Properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Thymeleaf Template Settings
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html